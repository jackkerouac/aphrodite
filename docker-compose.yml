# Default docker-compose configuration
# For development: use docker-compose -f docker-compose.dev.yml up
# For production: use docker-compose -f docker-compose.prod.yml up

services:
  db:
    image: postgres:14
    container_name: aphrodite-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-aphrodite}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aphrodite_secure_password}
      POSTGRES_DB: ${PG_DATABASE:-aphrodite}
    volumes:
      - aphrodite_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - aphrodite_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-aphrodite}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  aphrodite_network:
    driver: bridge

volumes:
  aphrodite_postgres_data:
